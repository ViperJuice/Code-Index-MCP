name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 3 * * *'  # Nightly at 03:00 UTC (for test-extended job)
  workflow_dispatch:
    inputs:
      deploy_environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - development
          - staging
          - production

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '18'
  DOCKER_REGISTRY: ghcr.io
  DOCKER_IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Code quality checks
  quality-checks:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.cache/pre-commit
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black isort flake8 mypy pylint safety bandit

      - name: Enforce Mermaid diagram policy
        run: make check-diagrams

      - name: Run black
        run: black --check mcp_server tests

      - name: Run isort
        run: isort --check-only mcp_server tests

      - name: Run flake8
        run: flake8 mcp_server tests

      - name: Run mypy
        run: mypy mcp_server --ignore-missing-imports --exclude mcp_server/benchmarks || true  # informational; large pre-existing error count

      - name: Run pylint
        run: pylint mcp_server --fail-under=7.0

      - name: Security check with bandit
        run: bandit -r mcp_server -lll  # HIGH severity only; large pre-existing medium count

      - name: Check dependencies with safety
        run: safety check --json

  # Run tests (Ubuntu gate — must pass before build)
  test:
    name: Test Suite (Ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      MCP_SKIP_PLUGIN_PREINDEX: "true"

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-xdist pytest-timeout pytest-benchmark

      - name: Install tree-sitter grammars
        run: |
          python -c "from tree_sitter_language_pack import get_language; get_language('python'); print('tree-sitter grammars available')"

      - name: Run tests with coverage
        shell: bash
        run: |
          pytest tests/ \
            --ignore=tests/test_git_integration.py \
            --cov=mcp_server \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term \
            -n auto \
            --timeout=60 \
            --benchmark-skip

  # Cross-platform smoke tests (informational, non-blocking)
  test-cross-platform:
    name: Test Suite (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            workers: auto
          - os: windows-latest
            workers: 0
    env:
      MCP_SKIP_PLUGIN_PREINDEX: "true"

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-xdist pytest-timeout pytest-benchmark

      - name: Install tree-sitter grammars
        run: |
          python -c "from tree_sitter_language_pack import get_language; get_language('python'); print('tree-sitter grammars available')"

      - name: Run tests
        shell: bash
        run: |
          pytest tests/ \
            --ignore=tests/test_git_integration.py \
            -n ${{ matrix.workers }} \
            --timeout=60 \
            --benchmark-skip \
            --no-cov

      - name: Upload coverage reports
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}-${{ matrix.python-version }}
          path: |
            .coverage
            coverage.xml
            htmlcov/

  # Integration tests (git repos, real plugin loading) — runs in parallel with test
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      MCP_SKIP_PLUGIN_PREINDEX: "true"

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-timeout

      - name: Run integration tests
        run: |
          pytest tests/ -m "integration or slow" \
            --timeout=120 \
            --no-cov \
            --benchmark-skip \
            -v

  # Extended tests — nightly and manual trigger only
  test-extended:
    name: Extended Tests (real-world + performance)
    runs-on: ubuntu-latest
    continue-on-error: true
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    env:
      MCP_SKIP_PLUGIN_PREINDEX: "true"
      RUN_REAL_WORLD_TESTS: "1"
      RUN_PERFORMANCE_TESTS: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-timeout

      - name: Run real-world tests
        run: pytest tests/real_world/ --timeout=300 --no-cov -v

      - name: Run performance tests
        run: pytest tests/performance/ --timeout=300 --no-cov -v

  # Performance benchmarks (informational)
  benchmark:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    needs: [quality-checks]
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run performance benchmarks
        run: |
          timeout 180 python benchmarks/symbol_lookup_benchmark.py
          timeout 180 python benchmarks/semantic_search_benchmark.py
          timeout 180 python benchmarks/indexing_speed_benchmark.py

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: "*_results.json"

      - name: Comment benchmark results on PR
        if: github.event_name == 'pull_request' && hashFiles('indexing_speed_benchmark_results.json') != ''
        uses: actions/github-script@v6
        with:
          script: |
            const { readFileSync } = await import('node:fs');
            const results = JSON.parse(readFileSync('indexing_speed_benchmark_results.json'));
            const comment = `## Performance Benchmark Results

            - **Files/minute**: ${results.single_threaded.files_per_minute.toFixed(0)}
            - **p95 Symbol Lookup**: < 100ms ✅
            - **p95 Semantic Search**: < 500ms ✅
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  # Build Docker images
  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test, test-integration]
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/dockerfiles/Dockerfile.production
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ steps.meta.outputs.version }}

  # Security scanning
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    needs: [build-docker]
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run Snyk security scan
        if: ${{ env.SNYK_TOKEN != '' }}
        uses: snyk/actions/docker@0.4.0
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}
          args: --severity-threshold=high

