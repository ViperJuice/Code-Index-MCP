name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      deploy_environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - development
          - staging
          - production

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '18'
  DOCKER_REGISTRY: ghcr.io
  DOCKER_IMAGE_NAME: viperjuice/code-index-mcp
  DOCKER_IMAGE_REF: ghcr.io/viperjuice/code-index-mcp
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  MCP_SKIP_PLUGIN_PREINDEX: "true"

jobs:
  alpha-format-lint:
    name: Alpha Gate - Format And Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep
          python -m pip install --upgrade pip uv
          uv sync --locked --extra dev --extra semantic
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Run focused alpha format and lint checks
        run: make alpha-format-lint

  alpha-unit-release-smoke:
    name: Alpha Gate - Unit And Release Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev ripgrep

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip uv
          uv sync --locked --extra dev
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Install tree-sitter grammars
        run: |
          python -c "from tree_sitter_language_pack import get_language; get_language('python'); print('tree-sitter grammars available')"

      - name: Run alpha unit and release smoke checks
        run: |
          make alpha-unit-release-smoke
          # make release-smoke is invoked by alpha-unit-release-smoke.

  alpha-integration-smoke:
    name: Alpha Gate - Integration Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev ripgrep

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip uv
          uv sync --locked --extra dev
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Run alpha integration smoke checks
        run: make alpha-integration-smoke

  alpha-docs-truth:
    name: Alpha Gate - Docs Truth
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip uv
          uv sync --locked --extra dev
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Run docs and release truth checks
        run: make alpha-docs-truth

  alpha-required-gates-passed:
    name: Alpha Gate - Required Gates Passed
    runs-on: ubuntu-latest
    needs:
      - alpha-format-lint
      - alpha-unit-release-smoke
      - alpha-integration-smoke
      - alpha-docs-truth
    steps:
      - name: Confirm required main CI gates passed
        run: echo "Required main CI alpha gates passed."

  informational-test-cross-platform:
    name: Informational - Test Suite (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            workers: auto
          - os: windows-latest
            workers: 0
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip uv
          uv sync --locked --extra dev
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Install ripgrep
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            brew install ripgrep
          elif [ "$RUNNER_OS" = "Windows" ]; then
            choco install ripgrep -y
          fi

      - name: Run cross-platform tests
        shell: bash
        run: |
          uv run pytest tests/ \
            --ignore=tests/test_git_integration.py \
            -n ${{ matrix.workers }} \
            --timeout=60 \
            --benchmark-skip \
            --no-cov

  informational-extended-tests:
    name: Informational - Extended Tests
    runs-on: ubuntu-latest
    continue-on-error: true
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip uv
          uv sync --locked --extra dev
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Run real-world and performance suites
        env:
          RUN_REAL_WORLD_TESTS: "1"
          RUN_PERFORMANCE_TESTS: "1"
        run: |
          pytest tests/real_world/ --timeout=300 --no-cov -v
          pytest tests/performance/ --timeout=300 --no-cov -v

  informational-authenticated-attestations:
    name: Informational - Authenticated Tests (gh attestations)
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    continue-on-error: true
    timeout-minutes: 15
    env:
      RUN_GH_AUTHENTICATED_TESTS: "1"
    steps:
      - name: Check for ATTESTATION_GH_TOKEN secret
        id: check-secret
        env:
          HAS_TOKEN: ${{ secrets.ATTESTATION_GH_TOKEN != '' }}
        run: |
          if [ "$HAS_TOKEN" = "true" ]; then
            echo "secret_present=true" >> "$GITHUB_OUTPUT"
          else
            echo "secret_present=false" >> "$GITHUB_OUTPUT"
            echo "ATTESTATION_GH_TOKEN secret is not set; authenticated attestation tests skipped."
          fi

      - uses: actions/checkout@v4
        if: steps.check-secret.outputs.secret_present == 'true'
        with:
          submodules: recursive

      - name: Set up Python
        if: steps.check-secret.outputs.secret_present == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        if: steps.check-secret.outputs.secret_present == 'true'
        run: |
          python -m pip install --upgrade pip uv
          uv sync --locked --extra dev
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Run gh-authenticated tests
        if: steps.check-secret.outputs.secret_present == 'true'
        env:
          GH_TOKEN: ${{ secrets.ATTESTATION_GH_TOKEN }}
        run: |
          pytest tests/security/test_artifact_attestation.py \
            -m requires_gh_auth \
            --timeout=120 \
            --no-cov \
            --benchmark-skip \
            -v

  informational-benchmark:
    name: Informational - Performance Benchmarks
    runs-on: ubuntu-latest
    needs: [alpha-format-lint]
    continue-on-error: true
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip uv
          uv sync --locked --extra dev --extra semantic
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Run performance benchmarks
        run: |
          timeout 180 python benchmarks/symbol_lookup_benchmark.py
          timeout 180 python benchmarks/semantic_search_benchmark.py
          timeout 180 python benchmarks/indexing_speed_benchmark.py

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: "*_results.json"

  informational-security-scan:
    name: Informational - Security Scanning
    runs-on: ubuntu-latest
    continue-on-error: true
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
