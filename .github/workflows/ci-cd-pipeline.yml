# localci-workflow-classification: protected-evidence
name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      deploy_environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - development
          - staging
          - production

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '18'
  DOCKER_REGISTRY: ghcr.io
  DOCKER_IMAGE_NAME: viperjuice/code-index-mcp
  DOCKER_IMAGE_REF: ghcr.io/viperjuice/code-index-mcp
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  MCP_SKIP_PLUGIN_PREINDEX: "true"

jobs:
  agent-gate:
    name: Protected Evidence - Agent Gate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev ripgrep

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip uv
          uv sync --locked --extra dev --extra semantic
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Install tree-sitter grammars for release smoke
        run: |
          python -c "from tree_sitter_language_pack import get_language; get_language('python'); print('tree-sitter grammars available')"

      - name: Run pre-PR agent gate
        run: make agent-gate

  agent-gate-passed:
    name: Protected Evidence - Agent Gate Passed
    runs-on: ubuntu-latest
    needs:
      - agent-gate
    steps:
      - name: Confirm protected agent gate passed
        run: echo "Required protected LOCALCI gate passed."

  informational-test-cross-platform:
    name: Informational - Test Suite (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    if: github.event_name == 'workflow_dispatch'
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            workers: auto
          - os: windows-latest
            workers: 0
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip uv
          uv sync --locked --extra dev
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Install ripgrep
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            brew install ripgrep
          elif [ "$RUNNER_OS" = "Windows" ]; then
            choco install ripgrep -y
          fi

      - name: Run cross-platform tests
        shell: bash
        run: |
          uv run pytest tests/ \
            --ignore=tests/test_git_integration.py \
            -n ${{ matrix.workers }} \
            --timeout=60 \
            --benchmark-skip \
            --no-cov

  informational-extended-tests:
    name: Informational - Extended Tests
    runs-on: ubuntu-latest
    continue-on-error: true
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip uv
          uv sync --locked --extra dev
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Run real-world and performance suites
        env:
          RUN_REAL_WORLD_TESTS: "1"
          RUN_PERFORMANCE_TESTS: "1"
        run: |
          pytest tests/real_world/ --timeout=300 --no-cov -v
          pytest tests/performance/ --timeout=300 --no-cov -v

  informational-authenticated-attestations:
    name: Informational - Authenticated Tests (gh attestations)
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    continue-on-error: true
    timeout-minutes: 15
    env:
      RUN_GH_AUTHENTICATED_TESTS: "1"
    steps:
      - name: Check for ATTESTATION_GH_TOKEN secret
        id: check-secret
        env:
          HAS_TOKEN: ${{ secrets.ATTESTATION_GH_TOKEN != '' }}
        run: |
          if [ "$HAS_TOKEN" = "true" ]; then
            echo "secret_present=true" >> "$GITHUB_OUTPUT"
          else
            echo "secret_present=false" >> "$GITHUB_OUTPUT"
            echo "ATTESTATION_GH_TOKEN secret is not set; authenticated attestation tests skipped."
          fi

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        if: steps.check-secret.outputs.secret_present == 'true'
        with:
          submodules: recursive

      - name: Set up Python
        if: steps.check-secret.outputs.secret_present == 'true'
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        if: steps.check-secret.outputs.secret_present == 'true'
        run: |
          python -m pip install --upgrade pip uv
          uv sync --locked --extra dev
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Run gh-authenticated tests
        if: steps.check-secret.outputs.secret_present == 'true'
        env:
          GH_TOKEN: ${{ secrets.ATTESTATION_GH_TOKEN }}
        run: |
          pytest tests/security/test_artifact_attestation.py \
            -m requires_gh_auth \
            --timeout=120 \
            --no-cov \
            --benchmark-skip \
            -v

  informational-benchmark:
    name: Informational - Performance Benchmarks
    runs-on: ubuntu-latest
    needs: [agent-gate]
    continue-on-error: true
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip uv
          uv sync --locked --extra dev --extra semantic
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Run performance benchmarks
        run: |
          timeout 180 python benchmarks/symbol_lookup_benchmark.py
          timeout 180 python benchmarks/semantic_search_benchmark.py
          timeout 180 python benchmarks/indexing_speed_benchmark.py

      - name: Upload benchmark results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: benchmark-results
          path: "*_results.json"

  informational-security-scan:
    name: Informational - Security Scanning
    runs-on: ubuntu-latest
    continue-on-error: true
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3
        with:
          sarif_file: 'trivy-results.sarif'
