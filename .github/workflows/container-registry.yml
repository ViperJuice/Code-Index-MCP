name: Container Registry Management

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: viperjuice/code-index-mcp
  IMAGE_REF: ghcr.io/viperjuice/code-index-mcp

jobs:
  alpha-docker-build-smoke:
    name: Alpha Gate - Docker Build And Smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REF }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=ref,event=tag
            type=raw,value=alpha-gate,enable=true
            type=sha,prefix={{branch}}-,format=short
          labels: |
            org.opencontainers.image.title=Code Index MCP
            org.opencontainers.image.description=Code Index MCP Server

      - name: Set up Python for smoke harness
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install smoke harness dependencies
        run: |
          python -m pip install --upgrade pip uv
          uv sync --locked --extra dev

      - name: Build production container image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/dockerfiles/Dockerfile.production
          platforms: linux/amd64
          push: false
          load: true
          tags: ${{ env.IMAGE_REF }}:alpha-gate
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=alpha-gate
          cache-to: type=gha,mode=max,scope=alpha-gate
          build-args: |
            BUILD_DATE=${{ github.event.repository.updated_at }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ steps.meta.outputs.version }}

      - name: Run production container smoke
        run: make release-smoke-container

  informational-container-security-scan:
    name: Informational - Container Security Scan
    needs: alpha-docker-build-smoke
    runs-on: ubuntu-latest
    continue-on-error: true
    if: github.event_name == 'workflow_dispatch'
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: 'sarif'
          output: trivy-results.sarif
          severity: 'CRITICAL,HIGH,MEDIUM'
          vuln-type: 'os,library'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  informational-push-manifests:
    name: Informational - Push Multi-Platform Manifests
    needs: alpha-docker-build-smoke
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REF }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-,format=short

      - name: Build and push release images
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/dockerfiles/Dockerfile.production
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.repository.updated_at }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ steps.meta.outputs.version }}

  informational-cleanup-old-images:
    name: Informational - Cleanup Old Images
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    permissions:
      packages: write
    steps:
      - name: Delete old container images
        uses: actions/delete-package-versions@v5
        with:
          package-name: 'code-index-mcp'
          package-type: 'container'
          min-versions-to-keep: 10
          delete-only-pre-release-versions: false
          token: ${{ secrets.GITHUB_TOKEN }}

  informational-sign-images:
    name: Informational - Sign Container Images
    needs: informational-push-manifests
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      packages: write
      id-token: write
    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign container images
        env:
          COSIGN_EXPERIMENTAL: 1
        run: |
          IMAGE_DIGEST=$(crane digest "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}")
          cosign sign --yes "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${IMAGE_DIGEST}"
