# localci-workflow-classification: protected-evidence
name: Container Registry Management

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  alpha-docker-build-smoke:
    name: Alpha Gate - Docker Build And Smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Derive lowercase GHCR image name (follows repo owner across transfers)
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "IMAGE_NAME=${owner}/code-index-mcp" >> "$GITHUB_ENV"
          echo "IMAGE_REF=${REGISTRY}/${owner}/code-index-mcp" >> "$GITHUB_ENV"

      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.IMAGE_REF }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=ref,event=tag
            type=raw,value=alpha-gate,enable=true
            type=sha,prefix={{branch}}-,format=short
          labels: |
            org.opencontainers.image.title=Code Index MCP
            org.opencontainers.image.description=Code Index MCP Server

      - name: Set up Python for smoke harness
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'

      - name: Install smoke harness dependencies
        run: |
          python -m pip install --upgrade pip uv
          uv sync --locked --extra dev

      - name: Build production container image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          file: ./docker/dockerfiles/Dockerfile.production
          platforms: linux/amd64
          push: false
          load: true
          tags: ${{ env.IMAGE_REF }}:alpha-gate
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=alpha-gate
          cache-to: type=gha,mode=max,scope=alpha-gate
          build-args: |
            BUILD_DATE=${{ github.event.repository.updated_at }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ steps.meta.outputs.version }}

      - name: Run production container smoke
        run: make release-smoke-container

  informational-container-security-scan:
    name: Informational - Container Security Scan
    needs: alpha-docker-build-smoke
    runs-on: ubuntu-latest
    continue-on-error: true
    if: github.event_name == 'workflow_dispatch'
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: 'sarif'
          output: trivy-results.sarif
          severity: 'CRITICAL,HIGH,MEDIUM'
          vuln-type: 'os,library'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3
        with:
          sarif_file: trivy-results.sarif

  informational-push-manifests:
    name: Informational - Push Multi-Platform Manifests
    needs: alpha-docker-build-smoke
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    steps:
      - name: Derive lowercase GHCR image name (follows repo owner across transfers)
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "IMAGE_NAME=${owner}/code-index-mcp" >> "$GITHUB_ENV"
          echo "IMAGE_REF=${REGISTRY}/${owner}/code-index-mcp" >> "$GITHUB_ENV"

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.IMAGE_REF }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-,format=short

      - name: Guard protected main before build and push release images
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.sha }}"
          git fetch origin main --no-tags
          git merge-base --is-ancestor "${{ github.sha }}" origin/main
          VERSION_NO_V="${GITHUB_REF_NAME#v}"
          grep -Fxq "version = \"$VERSION_NO_V\"" pyproject.toml
          grep -Fxq "__version__ = \"$VERSION_NO_V\"" mcp_server/__init__.py

      - name: Build and push release images
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          file: ./docker/dockerfiles/Dockerfile.production
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.repository.updated_at }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ steps.meta.outputs.version }}

  informational-sign-images:
    name: Informational - Sign Container Images
    needs: informational-push-manifests
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Derive lowercase GHCR image name (follows repo owner across transfers)
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "IMAGE_NAME=${owner}/code-index-mcp" >> "$GITHUB_ENV"
          echo "IMAGE_REF=${REGISTRY}/${owner}/code-index-mcp" >> "$GITHUB_ENV"

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Log in to Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Guard protected main before signing container images
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.sha }}"
          git fetch origin main --no-tags
          git merge-base --is-ancestor "${{ github.sha }}" origin/main
          VERSION_NO_V="${GITHUB_REF_NAME#v}"
          grep -Fxq "version = \"$VERSION_NO_V\"" pyproject.toml
          grep -Fxq "__version__ = \"$VERSION_NO_V\"" mcp_server/__init__.py

      - name: Sign container images
        env:
          COSIGN_EXPERIMENTAL: 1
          # Bind the tag name to an env var rather than interpolating the
          # ${{ github.ref_name }} context directly into the shell script.
          REF_NAME: ${{ github.ref_name }}
        run: |
          # Resolve the manifest digest with docker buildx (preinstalled and
          # already authenticated above); avoids a crane binary that is not on
          # the runner and was never installed, which previously made this
          # signing step fail after a successful push.
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          IMAGE_DIGEST=$(docker buildx imagetools inspect \
            "${IMAGE}:${REF_NAME}" --format '{{.Manifest.Digest}}')
          cosign sign --yes "${IMAGE}@${IMAGE_DIGEST}"
