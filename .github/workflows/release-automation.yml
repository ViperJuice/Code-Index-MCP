# localci-workflow-classification: manual-only
name: Release Automation

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Prepare a release PR or publish an already-merged release'
        required: true
        default: 'prepare'
        type: choice
        options:
          - prepare
          - publish
      version:
        description: 'Exact version to prepare or publish (e.g., v1.3.1)'
        required: true
        default: 'v1.3.1'
        type: string
      auto_merge:
        description: 'Enable auto-merge for the prepared release PR'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: read

env:
  RELEASE_VERSION: ${{ inputs.version }}

jobs:
  validate-dispatch:
    name: Validate release dispatch
    runs-on: ubuntu-latest
    steps:
      - name: Validate mode, ref, and version syntax
        env:
          MODE: ${{ inputs.mode }}
        run: |
          case "$RELEASE_VERSION" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *)
              echo "::error::Version must use a v-prefixed semantic version"
              exit 1
              ;;
          esac

          if [ "$MODE" = "publish" ] && [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "::error::Publish mode must be dispatched from protected main"
            exit 1
          fi
          if [ "$MODE" = "prepare" ] && [ "$GITHUB_REF" = "refs/heads/main" ]; then
            echo "::error::Prepare mode must be dispatched from a release feature branch"
            exit 1
          fi

  prepare-release-pr:
    name: Validate release preparation
    needs: validate-dispatch
    if: inputs.mode == 'prepare'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out prepared branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'

      - name: Validate prepared version
        run: |
          VERSION_NO_V=${RELEASE_VERSION#v}
          test "$GITHUB_REF_NAME" != "main"
          git fetch origin main
          git merge-base --is-ancestor origin/main HEAD
          grep -Fxq "version = \"$VERSION_NO_V\"" pyproject.toml
          grep -Fxq "__version__ = \"$VERSION_NO_V\"" mcp_server/__init__.py

      - name: Run release preparation gates
        run: |
          python -m pip install --upgrade pip uv
          uv sync --locked --extra dev --extra semantic
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
          make agent-gate
          make release-smoke
          make release-smoke-container

  create-release-pr:
    name: Create release pull request
    needs: prepare-release-pr
    if: inputs.mode == 'prepare'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Create or update release pull request
        id: release_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="$GITHUB_REF_NAME"
          TITLE="Release $RELEASE_VERSION"
          cat > "$RUNNER_TEMP/release-pr.md" <<EOF
          ## Release $RELEASE_VERSION

          This PR prepares the repo-owned $RELEASE_VERSION package and documentation surface.
          Publication remains a separate protected-main workflow dispatch after merge.

          - [x] Local release gates passed
          - [x] Version metadata is exact
          - [x] No tag or package was published by prepare mode
          EOF
          PR_NUMBER=$(gh pr list --base main --head "$BRANCH" --state open --json number --jq '.[0].number')
          if [ -z "$PR_NUMBER" ]; then
            PR_URL=$(gh pr create --base main --head "$BRANCH" --title "$TITLE" --body-file "$RUNNER_TEMP/release-pr.md")
            PR_NUMBER=${PR_URL##*/}
          else
            gh pr edit "$PR_NUMBER" --title "$TITLE" --body-file "$RUNNER_TEMP/release-pr.md"
          fi
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Enable auto-merge
        if: inputs.auto_merge == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.release_pr.outputs.number }}
        run: gh pr merge "$PR_NUMBER" --auto --merge

  preflight-publish:
    name: Verify protected main and run release gates
    needs: validate-dispatch
    if: inputs.mode == 'publish' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Check out exact protected-main commit
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'

      - name: Prove exact protected-main version
        run: |
          VERSION_NO_V=${RELEASE_VERSION#v}
          git fetch origin main --tags
          test "$(git rev-parse HEAD)" = "${{ github.sha }}"
          git merge-base --is-ancestor "${{ github.sha }}" origin/main
          grep -Fxq "version = \"$VERSION_NO_V\"" pyproject.toml
          grep -Fxq "__version__ = \"$VERSION_NO_V\"" mcp_server/__init__.py
          if git show-ref --verify --quiet "refs/tags/$RELEASE_VERSION"; then
            test "$(git rev-list -n 1 "$RELEASE_VERSION")" = "${{ github.sha }}"
          fi

      - name: Run release gates
        run: |
          python -m pip install --upgrade pip uv
          uv sync --locked --extra dev --extra semantic
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
          make agent-gate
          make release-smoke
          make release-smoke-container

  build-release:
    name: Build artifacts from protected main
    needs: preflight-publish
    if: inputs.mode == 'publish' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Check out exact protected-main commit
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'

      - name: Build Python distributions
        run: |
          python -m pip install --upgrade pip uv
          uv sync --locked --extra dev
          uv build

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Guard protected main before build and push container images
        run: |
          VERSION_NO_V=${RELEASE_VERSION#v}
          git fetch origin main --tags
          test "$(git rev-parse HEAD)" = "${{ github.sha }}"
          git merge-base --is-ancestor "${{ github.sha }}" origin/main
          grep -Fxq "version = \"$VERSION_NO_V\"" pyproject.toml
          grep -Fxq "__version__ = \"$VERSION_NO_V\"" mcp_server/__init__.py

      - name: Build and push container images
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          file: ./docker/dockerfiles/Dockerfile.production
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: mode=max
          tags: |
            ghcr.io/viperjuice/code-index-mcp:${{ inputs.version }}
            ${{ !contains(inputs.version, '-') && 'ghcr.io/viperjuice/code-index-mcp:latest' || '' }}
          labels: |
            org.opencontainers.image.version=${{ inputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Upload release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-artifacts-${{ github.sha }}
          if-no-files-found: error
          path: |
            dist/
            sbom.spdx.json
            CHANGELOG.md

  publish-release:
    name: Publish protected-main artifacts
    needs: build-release
    if: inputs.mode == 'publish' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Check out exact protected-main commit
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Download exact release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: release-artifacts-${{ github.sha }}
          path: .

      - name: Guard protected main before create and push tag
        run: |
          VERSION_NO_V=${RELEASE_VERSION#v}
          git fetch origin main --tags
          test "$(git rev-parse HEAD)" = "${{ github.sha }}"
          git merge-base --is-ancestor "${{ github.sha }}" origin/main
          grep -Fxq "version = \"$VERSION_NO_V\"" pyproject.toml
          grep -Fxq "__version__ = \"$VERSION_NO_V\"" mcp_server/__init__.py

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git show-ref --verify --quiet "refs/tags/$RELEASE_VERSION"; then
            test "$(git rev-list -n 1 "$RELEASE_VERSION")" = "${{ github.sha }}"
          else
            git tag -a "$RELEASE_VERSION" "${{ github.sha }}" -m "Release $RELEASE_VERSION"
            git push origin "$RELEASE_VERSION"
          fi

      - name: Guard protected main before create github release
        run: |
          VERSION_NO_V=${RELEASE_VERSION#v}
          git fetch origin main --tags
          test "$(git rev-parse HEAD)" = "${{ github.sha }}"
          git merge-base --is-ancestor "${{ github.sha }}" origin/main
          grep -Fxq "version = \"$VERSION_NO_V\"" pyproject.toml
          grep -Fxq "__version__ = \"$VERSION_NO_V\"" mcp_server/__init__.py
          test "$(git rev-list -n 1 "$RELEASE_VERSION")" = "${{ github.sha }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          tag_name: ${{ inputs.version }}
          target_commitish: ${{ github.sha }}
          name: Release ${{ inputs.version }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: ${{ contains(inputs.version, '-') }}
          files: |
            dist/*
            sbom.spdx.json

      - name: Guard protected main before publish to pypi
        run: |
          VERSION_NO_V=${RELEASE_VERSION#v}
          git fetch origin main --tags
          test "$(git rev-parse HEAD)" = "${{ github.sha }}"
          git merge-base --is-ancestor "${{ github.sha }}" origin/main
          grep -Fxq "version = \"$VERSION_NO_V\"" pyproject.toml
          grep -Fxq "__version__ = \"$VERSION_NO_V\"" mcp_server/__init__.py
          test "$(git rev-list -n 1 "$RELEASE_VERSION")" = "${{ github.sha }}"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: dist/
