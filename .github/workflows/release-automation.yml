name: Release Automation

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.2.0-rc3)'
        required: true
        default: 'v1.2.0-rc3'
        type: string
      release_type:
        description: 'Release type'
        required: true
        default: 'minor'
        type: choice
        options:
          - patch
          - minor
          - major
          - custom
      auto_merge:
        description: 'Automatically merge the release PR'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write
  id-token: write

env:
  SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}

jobs:
  preflight-release-gates:
    name: Preflight Release Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip uv
          uv sync --locked --extra dev --extra semantic
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Validate requested release version
        run: |
          VERSION="${{ inputs.version }}"
          VERSION_NO_V=${VERSION#v}
          grep -q "default: 'v1.2.0-rc3'" .github/workflows/release-automation.yml
          grep -q "version = \"$VERSION_NO_V\"" pyproject.toml
          grep -q "__version__ = \"$VERSION_NO_V\"" mcp_server/__init__.py

      - name: Run alpha release gates
        run: |
          make alpha-release-gates
          # make release-smoke is invoked by alpha-release-gates.

  prepare-release:
    name: Prepare Release
    needs: preflight-release-gates
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.determine_version.outputs.version }}
      changelog: ${{ steps.generate_changelog.outputs.changelog }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine Version
        id: determine_version
        run: |
          if [ "${{ inputs.release_type }}" == "custom" ]; then
            VERSION="${{ inputs.version }}"
          else
            LATEST_TAG=$(git tag --list 'v[0-9]*' --sort=-version:refname | head -1 || true)
            [ -z "$LATEST_TAG" ] && LATEST_TAG="v0.0.0"
            VERSION_MAJOR=$(echo "$LATEST_TAG" | sed 's/v//' | cut -d. -f1)
            VERSION_MINOR=$(echo "$LATEST_TAG" | sed 's/v//' | cut -d. -f2)
            VERSION_PATCH=$(echo "$LATEST_TAG" | sed 's/v//' | cut -d. -f3)
            case "${{ inputs.release_type }}" in
              major)
                VERSION_MAJOR=$((VERSION_MAJOR + 1))
                VERSION_MINOR=0
                VERSION_PATCH=0
                ;;
              minor)
                VERSION_MINOR=$((VERSION_MINOR + 1))
                VERSION_PATCH=0
                ;;
              patch)
                VERSION_PATCH=$((VERSION_PATCH + 1))
                ;;
            esac
            VERSION="v${VERSION_MAJOR}.${VERSION_MINOR}.${VERSION_PATCH}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version will be: $VERSION"

      - name: Update Version Files
        run: |
          VERSION="${{ steps.determine_version.outputs.version }}"
          VERSION_NO_V=${VERSION#v}
          sed -i "s/^version = .*/version = \"$VERSION_NO_V\"/" pyproject.toml
          find . -name "__init__.py" -path "*/mcp_server/*" -exec sed -i "s/__version__ = .*/__version__ = \"$VERSION_NO_V\"/" {} \; 2>/dev/null || true

      - name: Generate Changelog
        id: generate_changelog
        run: |
          VERSION="${{ steps.determine_version.outputs.version }}"
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          {
            echo "# Changelog for $VERSION"
            echo ""
            echo "## What's Changed"
            echo ""
            if [ -n "$PREVIOUS_TAG" ]; then
              git log "${PREVIOUS_TAG}..HEAD" --pretty=format:"- %s (%an)"
            else
              echo "Initial release"
            fi
          } > RELEASE_NOTES.md
          {
            echo "changelog<<EOF"
            cat RELEASE_NOTES.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Update CHANGELOG.md
        run: |
          VERSION="${{ steps.determine_version.outputs.version }}"
          DATE=$(date +%Y-%m-%d)
          {
            echo "# Changelog"
            echo ""
            echo "## [$VERSION] - $DATE"
            tail -n +2 RELEASE_NOTES.md
            echo ""
            if [ -f CHANGELOG.md ]; then
              tail -n +2 CHANGELOG.md
            fi
          } > CHANGELOG.tmp
          mv CHANGELOG.tmp CHANGELOG.md

      - name: Commit Version Changes
        run: |
          VERSION="${{ steps.determine_version.outputs.version }}"
          git add -A
          git commit -m "chore: bump version to $VERSION" || echo "No changes to commit"

      - name: Create Release Branch
        run: |
          VERSION="${{ steps.determine_version.outputs.version }}"
          BRANCH="release/$VERSION"
          git checkout -b "$BRANCH"
          git push origin "$BRANCH"

  run-tests:
    name: Run Release Tests
    needs: [preflight-release-gates, prepare-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/${{ needs.prepare-release.outputs.version }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip uv
          uv sync --locked --extra dev
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Run release smoke tests
        run: make release-smoke

      - name: Validate version consistency
        run: |
          VERSION="${{ needs.prepare-release.outputs.version }}"
          VERSION_NO_V=${VERSION#v}
          grep -q "version = \"$VERSION_NO_V\"" pyproject.toml || exit 1
          grep -q "__version__ = \"$VERSION_NO_V\"" mcp_server/__init__.py || exit 1
          echo "Version consistency check passed"

  build-artifacts:
    name: Build Release Artifacts
    needs: [preflight-release-gates, prepare-release, run-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/${{ needs.prepare-release.outputs.version }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build Python package
        run: |
          python -m pip install --upgrade pip uv
          uv sync --locked --extra dev
          uv build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker images
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/dockerfiles/Dockerfile.production
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/viperjuice/code-index-mcp:${{ needs.prepare-release.outputs.version }}
            ghcr.io/viperjuice/code-index-mcp:latest
          build-args: |
            VERSION=${{ needs.prepare-release.outputs.version }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
            VCS_REF=${{ github.sha }}

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            dist/
            sbom.spdx.json
            RELEASE_NOTES.md

  create-release:
    name: Create GitHub Release
    needs: [preflight-release-gates, prepare-release, build-artifacts]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/${{ needs.prepare-release.outputs.version }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts

      - name: Create and push tag
        run: |
          VERSION="${{ needs.prepare-release.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.version }}
          name: Release ${{ needs.prepare-release.outputs.version }}
          body: ${{ needs.prepare-release.outputs.changelog }}
          draft: false
          prerelease: false
          files: |
            dist/*
            sbom.spdx.json
            CHANGELOG.md
            docs/DEPLOYMENT-GUIDE.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  merge-release:
    name: Merge Release Branch
    needs: [preflight-release-gates, prepare-release, create-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: release/${{ needs.prepare-release.outputs.version }}
          base: main
          title: "Release ${{ needs.prepare-release.outputs.version }}"
          body: |
            ## Release ${{ needs.prepare-release.outputs.version }}

            P21 release contract target: v1.2.0-rc3

            This PR contains all changes for release ${{ needs.prepare-release.outputs.version }}.

            ### Checklist
            - [x] Alpha release gates passed
            - [x] Version bumped
            - [x] Changelog updated
            - [x] Release smoke passed
            - [x] Docker images built
            - [x] Release created

            ### Release Notes
            ${{ needs.prepare-release.outputs.changelog }}
          labels: |
            release
            automated

      - name: Auto-merge PR
        if: ${{ github.event.inputs.auto_merge == 'true' }}
        run: |
          PR_NUMBER=$(gh pr list --base main --head release/${{ needs.prepare-release.outputs.version }} --json number -q '.[0].number')
          gh pr merge "$PR_NUMBER" --auto --merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  post-release:
    name: Post-Release Tasks
    needs: [preflight-release-gates, prepare-release, create-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update documentation
        run: |
          VERSION="${{ needs.prepare-release.outputs.version }}"
          sed -i "s/Latest Version: .*/Latest Version: $VERSION/" README.md || true
          find docs -name "*.md" -exec sed -i "s/code-index-mcp:.*/code-index-mcp:$VERSION/g" {} \;

      - name: Notify Slack
        if: env.SLACK_WEBHOOK != ''
        run: |
          VERSION="${{ needs.prepare-release.outputs.version }}"
          curl -X POST "$SLACK_WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d "{\"text\":\"MCP Server $VERSION has been released.\"}"

      - name: Trigger deployment workflows
        run: |
          VERSION="${{ needs.prepare-release.outputs.version }}"
          if gh workflow view deploy-staging.yml >/dev/null 2>&1; then
            gh workflow run deploy-staging.yml -f version=$VERSION
          else
            echo "deploy-staging.yml not present; skipping staging trigger"
          fi
          gh label create deployment --color 1d76db --description "Deployment tracking" 2>/dev/null || true
          gh label create production --color b60205 --description "Production release work" 2>/dev/null || true
          gh issue create \
            --title "Production Deployment: $VERSION" \
            --body "Please review and approve production deployment for version $VERSION" \
            --label "deployment,production"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
