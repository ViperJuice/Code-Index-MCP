name: Index Artifact Management

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'validate'
        type: choice
        options:
          - validate
      artifact_name:
        description: 'Artifact name to validate'
        required: false
        type: string

  workflow_call:
    inputs:
      index_path:
        description: 'Path to index files'
        required: true
        type: string
      artifact_suffix:
        description: 'Suffix for artifact name'
        required: false
        default: ''
        type: string
      retention_days:
        description: 'Days to retain artifact'
        required: false
        default: '7'
        type: number

env:
  MAX_ARTIFACT_SIZE_MB: '500'

jobs:
  upload-index-artifact:
    name: Upload Index Artifact
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_call'
    outputs:
      artifact_name: ${{ steps.labels.outputs.artifact_name }}
      artifact_size: ${{ steps.package.outputs.size }}
      checksum: ${{ steps.package.outputs.checksum }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip uv
          uv sync --locked
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Prepare artifact labels
        id: labels
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          COMMIT_SHORT=$(git rev-parse --short HEAD)
          SUFFIX="${{ inputs.artifact_suffix }}"
          REPO_ID="${GITHUB_REPOSITORY//\//_}"
          TRACKED_BRANCH="$(git branch --show-current | tr '/:' '__')"
          if [ -n "$SUFFIX" ]; then
            ARTIFACT_NAME="mcp-index-${REPO_ID}-${TRACKED_BRANCH}-${COMMIT_SHORT}-${SUFFIX}-${TIMESTAMP}"
          else
            ARTIFACT_NAME="mcp-index-${REPO_ID}-${TRACKED_BRANCH}-${COMMIT_SHORT}-${TIMESTAMP}"
          fi
          echo "artifact_name=$ARTIFACT_NAME" >> $GITHUB_OUTPUT

      - name: Package repo-scoped index snapshot
        id: package
        run: |
          cd "${{ inputs.index_path }}"
          tar -czf index-archive.tar.gz \
            --exclude='*.log' \
            --exclude='*.tmp' \
            current.db \
            vector_index.qdrant \
            .index_metadata.json 2>/dev/null || true

          CHECKSUM=$(sha256sum index-archive.tar.gz | cut -d' ' -f1)
          echo "checksum=$CHECKSUM" >> $GITHUB_OUTPUT

          SIZE=$(stat -c%s index-archive.tar.gz 2>/dev/null || stat -f%z index-archive.tar.gz 2>/dev/null)
          echo "size_bytes=$SIZE" >> $GITHUB_OUTPUT
          SIZE_MB=$((SIZE / 1024 / 1024))
          echo "size=$SIZE_MB MB" >> $GITHUB_OUTPUT

          if [ $SIZE_MB -gt ${{ env.MAX_ARTIFACT_SIZE_MB }} ]; then
            echo "❌ Compressed archive too large: ${SIZE_MB}MB > ${MAX_ARTIFACT_SIZE_MB}MB"
            exit 1
          fi

      - name: Generate packaged artifact metadata
        run: |
          python scripts/index-artifact-upload.py --metadata-only \
            --repo "${GITHUB_REPOSITORY}" \
            --index-location "${{ inputs.index_path }}" \
            --index-path "${{ inputs.index_path }}/current.db" \
            --metadata-output "${{ inputs.index_path }}/artifact-metadata.json" \
            --checksum "${{ steps.package.outputs.checksum }}" \
            --size "${{ steps.package.outputs.size_bytes }}"

      - name: Upload artifact
        id: upload
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.labels.outputs.artifact_name }}
          path: |
            ${{ inputs.index_path }}/index-archive.tar.gz
            ${{ inputs.index_path }}/artifact-metadata.json
          retention-days: ${{ inputs.retention_days }}
          compression-level: 0

      - name: Output summary
        run: |
          echo "### 📦 Index Artifact Uploaded" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Name:** \`${{ steps.labels.outputs.artifact_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Size:** ${{ steps.package.outputs.size }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Checksum:** \`${{ steps.package.outputs.checksum }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Retention:** ${{ inputs.retention_days }} days" >> $GITHUB_STEP_SUMMARY

  validate-artifact:
    name: Validate Index Artifact
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'validate'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.artifact_name }}
          path: ./artifact-download

      - name: Validate artifact
        run: |
          cd artifact-download

          if [ ! -f "index-archive.tar.gz" ] || [ ! -f "artifact-metadata.json" ]; then
            echo "❌ Missing required files"
            exit 1
          fi

          EXPECTED_CHECKSUM=$(jq -r '.checksum' artifact-metadata.json)
          ACTUAL_CHECKSUM=$(sha256sum index-archive.tar.gz | cut -d' ' -f1)

          if [ "$EXPECTED_CHECKSUM" != "$ACTUAL_CHECKSUM" ]; then
            echo "❌ Checksum mismatch!"
            echo "Expected: $EXPECTED_CHECKSUM"
            echo "Actual: $ACTUAL_CHECKSUM"
            exit 1
          fi

          tar -tzf index-archive.tar.gz > /dev/null
          echo "✅ Artifact validated successfully"

          echo "### 📋 Artifact Metadata" >> $GITHUB_STEP_SUMMARY
          jq . artifact-metadata.json >> $GITHUB_STEP_SUMMARY
