# localci-workflow-classification: manual-only
name: Index Management

on:
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild all indexes'
        required: false
        default: 'false'
        type: boolean

env:
  LOCALCI_WORKFLOW_POSTURE: manual-only

jobs:
  local-index-operator-reminder:
    name: Manual Only - Local Index Artifact Validation
    runs-on: ubuntu-latest
    steps:
      - name: Explain manual-only posture
        run: |
          echo "Index artifact validation is manual-only after LOCALCI."
          echo "Run repo-local validation with make agent-gate or make agent-full."
          echo "Expected repo-scoped artifact paths remain .mcp-index/current.db and .mcp-index/.index_metadata.json."
          echo "Use index-artifact-management.yml only when an operator intentionally validates uploaded artifacts."
