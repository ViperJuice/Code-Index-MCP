name: MCP Index Management
on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    - cron: '0 0 * * 0'  # Weekly rebuild
  workflow_dispatch:
    inputs:
      rebuild:
        description: 'Force rebuild index'
        type: boolean
        default: false

env:
  MCP_INDEX_ENABLED: ${{ vars.MCP_INDEX_ENABLED || 'true' }}

jobs:
  check-enabled:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - id: check
        run: |
          if [ "${{ env.MCP_INDEX_ENABLED }}" = "false" ]; then
            echo "MCP indexing is disabled"
            echo "enabled=false" >> $GITHUB_OUTPUT
          else
            echo "enabled=true" >> $GITHUB_OUTPUT
          fi

  index-management:
    needs: check-enabled
    if: needs.check-enabled.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Check for existing index
        id: check_index
        run: |
          if [ -f ".mcp-index/code_index.db" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "Index found in repository"
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "No index found, will build or download"
          fi
      
      - name: Try to download latest index
        if: steps.check_index.outputs.found == 'false'
        id: download
        run: |
          echo "Checking for available index artifacts..."
          # This would download from artifacts - simplified for now
          echo "downloaded=false" >> $GITHUB_OUTPUT
      
      - name: Setup Python
        if: steps.check_index.outputs.found == 'false' && steps.download.outputs.downloaded == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Download MCP Indexer
        if: steps.check_index.outputs.found == 'false' && steps.download.outputs.downloaded == 'false'
        run: |
          # Download the portable MCP indexer
          curl -L https://github.com/yourusername/Code-Index-MCP/releases/latest/download/mcp-portable-indexer.pyz -o mcp-indexer.pyz
          chmod +x mcp-indexer.pyz
      
      - name: Build Index
        if: steps.check_index.outputs.found == 'false' && steps.download.outputs.downloaded == 'false'
        run: |
          # Create index directory
          mkdir -p .mcp-index
          
          # Run the indexer
          python mcp-indexer.pyz build             --config .mcp-index.json             --output .mcp-index/code_index.db             --ignore-file .mcp-index-ignore
      
      - name: Create index metadata
        if: steps.check_index.outputs.found == 'false' && steps.download.outputs.downloaded == 'false'
        run: |
          python <<'PY'
          import json
          import sqlite3
          from datetime import datetime
          from pathlib import Path

          index_dir = Path('.mcp-index')
          index_db = index_dir / 'code_index.db'
          metadata_path = index_dir / '.index_metadata.json'

          embedding_model = 'voyage-code-3'
          schema_version = '2'

          if metadata_path.exists():
              try:
                  existing = json.loads(metadata_path.read_text())
                  embedding_model = existing.get('embedding_model', embedding_model)
              except Exception:
                  pass

          if index_db.exists():
              try:
                  conn = sqlite3.connect(str(index_db))
                  cur = conn.execute("SELECT MAX(version) FROM schema_version")
                  value = cur.fetchone()[0]
                  if value is not None:
                      schema_version = str(value)
              except Exception:
                  pass
              finally:
                  try:
                      conn.close()
                  except Exception:
                      pass

          metadata = {
              "version": "1.0",
              "created_at": datetime.utcnow().isoformat() + 'Z',
              "commit": "${{ github.sha }}",
              "branch": "${{ github.ref_name }}",
              "repository": "${{ github.repository }}",
              "compatibility": {
                  "schema_version": schema_version,
                  "embedding_model": embedding_model,
              },
          }

          metadata_path.write_text(json.dumps(metadata, indent=2))
          PY
      
      - name: Compress index for artifact
        run: |
          cd .mcp-index
          tar -czf ../mcp-index-archive.tar.gz .
          cd ..
          sha256sum mcp-index-archive.tar.gz > mcp-index-archive.tar.gz.sha256

          CHECKSUM=$(cut -d' ' -f1 mcp-index-archive.tar.gz.sha256)
          python <<'PY'
          import json
          from datetime import datetime
          from pathlib import Path

          index_metadata_path = Path('.mcp-index/.index_metadata.json')
          index_metadata = json.loads(index_metadata_path.read_text()) if index_metadata_path.exists() else {}

          artifact_metadata = {
              "version": "1.0",
              "timestamp": datetime.utcnow().isoformat() + 'Z',
              "commit": "${{ github.sha }}",
              "branch": "${{ github.ref_name }}",
              "checksum": "__CHECKSUM__",
              "compatibility": index_metadata.get(
                  "compatibility",
                  {
                      "schema_version": "2",
                      "embedding_model": "voyage-code-3",
                  },
              ),
          }

          Path('artifact-metadata.json').write_text(json.dumps(artifact_metadata, indent=2))
          PY
          sed -i "s/__CHECKSUM__/$CHECKSUM/g" artifact-metadata.json
      
      - name: Upload index artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcp-index-${{ github.sha }}
          path: |
            mcp-index-archive.tar.gz
            mcp-index-archive.tar.gz.sha256
            artifact-metadata.json
          retention-days: ${{ fromJSON(github.event_name == 'push' && '30' || '7') }}
      
      - name: Upload index for PRs
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: mcp-index-pr-${{ github.event.pull_request.number }}
          path: |
            mcp-index-archive.tar.gz
            mcp-index-archive.tar.gz.sha256
            artifact-metadata.json
          retention-days: 7

  cleanup-old-artifacts:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Cleanup old artifacts
        uses: actions/github-script@v6
        with:
          script: |
            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });
            
            const cutoffDate = new Date();
            cutoffDate.setDate(cutoffDate.getDate() - 30);
            
            for (const artifact of artifacts.data.artifacts) {
              if (artifact.name.startsWith('mcp-index-') && 
                  new Date(artifact.created_at) < cutoffDate) {
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: artifact.id
                });
                console.log(`Deleted old artifact: ${artifact.name}`);
              }
            }
