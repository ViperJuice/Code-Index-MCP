# localci-workflow-classification: manual-only
name: MCP Index Management

on:
  workflow_dispatch:
    inputs:
      rebuild:
        description: 'Force rebuild index'
        type: boolean
        default: false

env:
  MCP_INDEX_ENABLED: ${{ vars.MCP_INDEX_ENABLED || 'true' }}

jobs:
  check-enabled:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - id: check
        run: |
          if [ "${{ env.MCP_INDEX_ENABLED }}" = "false" ]; then
            echo "MCP indexing is disabled"
            echo "enabled=false" >> $GITHUB_OUTPUT
          else
            echo "enabled=true" >> $GITHUB_OUTPUT
          fi

  index-management:
    needs: check-enabled
    if: needs.check-enabled.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Explain manual-only posture
        run: |
          echo "MCP index management remains manual-only after LOCALCI."
          echo "Do not rely on pull-request hosted rebuilds."
          echo "Build and validate indexes locally or on an owned offload surface."
