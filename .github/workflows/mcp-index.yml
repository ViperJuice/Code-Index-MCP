name: MCP Index Management
on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      rebuild:
        description: 'Force rebuild index'
        type: boolean
        default: false

env:
  MCP_INDEX_ENABLED: ${{ vars.MCP_INDEX_ENABLED || 'true' }}

jobs:
  check-enabled:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - id: check
        run: |
          if [ "${{ env.MCP_INDEX_ENABLED }}" = "false" ]; then
            echo "MCP indexing is disabled"
            echo "enabled=false" >> $GITHUB_OUTPUT
          else
            echo "enabled=true" >> $GITHUB_OUTPUT
          fi

  index-management:
    needs: check-enabled
    if: needs.check-enabled.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      - name: Check for existing index
        id: check_index
        run: |
          if [ -f ".mcp-index/code_index.db" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "Index found in repository"
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "No index found, will build or download"
          fi
      
      - name: Try to download latest index
        if: steps.check_index.outputs.found == 'false'
        id: download
        run: |
          if gh release download index-latest \
              --repo ${{ github.repository }} \
              --pattern "mcp-index-archive.tar.gz" \
              --dir /tmp/mcp-index-dl 2>/dev/null; then
            mkdir -p .mcp-index
            tar -xzf /tmp/mcp-index-dl/mcp-index-archive.tar.gz -C .mcp-index/
            echo "downloaded=true" >> $GITHUB_OUTPUT
          else
            echo "No existing release artifact found, will build."
            echo "downloaded=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        if: steps.check_index.outputs.found == 'false' && steps.download.outputs.downloaded == 'false'
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        if: steps.check_index.outputs.found == 'false' && steps.download.outputs.downloaded == 'false'
        run: |
          python -m pip install --upgrade pip uv
          uv sync --locked --extra semantic
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Build Index
        if: steps.check_index.outputs.found == 'false' && steps.download.outputs.downloaded == 'false'
        run: |
          # Lexical and semantic rebuild is intentionally skipped in CI.
          # Index artifacts are pushed from the local machine.
          echo "Skipping CI index rebuild. Artifacts should be pushed via local machine."
          mkdir -p .mcp-index
          if [ -f ".index_metadata.json" ]; then
            cp .index_metadata.json .mcp-index/.index_metadata.json
          fi
      
      - name: Preserve generated index metadata
        if: steps.check_index.outputs.found == 'false' && steps.download.outputs.downloaded == 'false'
        run: |
          python <<'PY'
          import json
          import sqlite3
          from datetime import datetime
          from pathlib import Path

          index_dir = Path('.mcp-index')
          index_db = index_dir / 'code_index.db'
          metadata_path = index_dir / '.index_metadata.json'

          if metadata_path.exists():
              print('Using generated dual-profile index metadata')
              raise SystemExit(0)

          schema_version = '2'
          if index_db.exists():
              try:
                  conn = sqlite3.connect(str(index_db))
                  cur = conn.execute("SELECT MAX(version) FROM schema_version")
                  value = cur.fetchone()[0]
                  if value is not None:
                      schema_version = str(value)
              except Exception:
                  pass
              finally:
                  try:
                      conn.close()
                  except Exception:
                      pass

          fallback_metadata = {
              "version": "1.0",
              "created_at": datetime.utcnow().isoformat() + 'Z',
              "commit": "${{ github.sha }}",
              "branch": "${{ github.ref_name }}",
              "repository": "${{ github.repository }}",
              "compatibility": {
                  "schema_version": schema_version,
                  "embedding_model": None,
              },
          }
          metadata_path.write_text(json.dumps(fallback_metadata, indent=2))
          print('Generated fallback metadata because no index metadata was produced')
          PY
      
      - name: Compress index for artifact
        run: |
          python <<'PY'
          import json
          from datetime import datetime
          from pathlib import Path

          metadata_path = Path('.mcp-index/.index_metadata.json')
          artifact_metadata_path = Path('.mcp-index/artifact-metadata.json')
          compatibility = {}

          if metadata_path.exists():
              index_metadata = json.loads(metadata_path.read_text())
              compatibility = index_metadata.get('compatibility') or {}
              if not compatibility:
                  compatibility = {
                      'schema_version': index_metadata.get('chunk_schema_version') or '2',
                      'embedding_model': index_metadata.get('embedding_model'),
                  }
              if isinstance(index_metadata.get('semantic_profiles'), dict):
                  compatibility['semantic_profiles'] = index_metadata['semantic_profiles']
                  compatibility['available_semantic_profiles'] = index_metadata.get(
                      'available_semantic_profiles',
                      sorted(index_metadata['semantic_profiles'].keys()),
                  )

          artifact_metadata = {
              'version': '1.0',
              'created_at': datetime.utcnow().isoformat() + 'Z',
              'commit': '${{ github.sha }}',
              'branch': '${{ github.ref_name }}',
              'repository': '${{ github.repository }}',
              'compatibility': compatibility,
          }
          artifact_metadata_path.write_text(json.dumps(artifact_metadata, indent=2))
          PY

          cd .mcp-index
          tar -czf ../mcp-index-archive.tar.gz .
          cd ..
          sha256sum mcp-index-archive.tar.gz > mcp-index-archive.tar.gz.sha256

          CHECKSUM=$(cut -d' ' -f1 mcp-index-archive.tar.gz.sha256)
          python <<'PY'
          import json
          from datetime import datetime
          from pathlib import Path

          index_metadata_path = Path('.mcp-index/.index_metadata.json')
          index_metadata = json.loads(index_metadata_path.read_text()) if index_metadata_path.exists() else {}
          compatibility = index_metadata.get("compatibility") or {}
          if not compatibility:
              compatibility = {
                  "schema_version": index_metadata.get("chunk_schema_version") or "2",
                  "embedding_model": index_metadata.get("embedding_model"),
              }
          if isinstance(index_metadata.get("semantic_profiles"), dict):
              compatibility["semantic_profiles"] = index_metadata["semantic_profiles"]
              compatibility["available_semantic_profiles"] = index_metadata.get(
                  "available_semantic_profiles",
                  sorted(index_metadata["semantic_profiles"].keys()),
              )

          artifact_metadata = {
              "version": "1.0",
              "timestamp": datetime.utcnow().isoformat() + 'Z',
              "commit": "${{ github.sha }}",
              "branch": "${{ github.ref_name }}",
              "artifact_type": "full",
              "base_commit": None,
              "target_commit": "${{ github.sha }}",
              "checksum": "__CHECKSUM__",
              "compatibility": compatibility,
          }

          Path('artifact-metadata.json').write_text(json.dumps(artifact_metadata, indent=2))
          PY
          sed -i "s/__CHECKSUM__/$CHECKSUM/g" artifact-metadata.json
      
      - name: Validate metadata matches Qdrant collections
        run: |
          python <<'PY'
          import json, sys
          from pathlib import Path
          meta_path = Path(".mcp-index/.index_metadata.json")
          qdrant_meta = (
              Path(".mcp-index/vector_index.qdrant/meta.json")
              if Path(".mcp-index/vector_index.qdrant/meta.json").exists()
              else Path("vector_index.qdrant/meta.json")
          )
          if not meta_path.exists():
              print("No index metadata — skipping validation (fresh build)")
              sys.exit(0)
          meta = json.loads(meta_path.read_text())
          profiles = meta.get("available_semantic_profiles", [])
          if not profiles:
              sys.exit(0)
          if not qdrant_meta.exists():
              print("No Qdrant meta — vector index not present")
              sys.exit(0)
          qdrant = json.loads(qdrant_meta.read_text())
          collections = set(qdrant.get("collections", {}).keys())
          missing = []
          for pid in profiles:
              col = meta["semantic_profiles"][pid]["collection_name"]
              if col not in collections:
                  missing.append(f"{pid} → {col}")
          if missing:
              print(f"FAIL: profiles in metadata but missing from Qdrant: {missing}")
              sys.exit(1)
          print(f"OK: all {len(profiles)} profiles have Qdrant collections")
          PY

      - name: Upload index artifact
        uses: actions/upload-artifact@v7
        with:
          name: mcp-index-${{ github.sha }}
          path: |
            mcp-index-archive.tar.gz
            mcp-index-archive.tar.gz.sha256
            artifact-metadata.json
          retention-days: ${{ fromJSON(github.event_name == 'push' && '30' || '7') }}
      
      - name: Upload index for PRs
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: mcp-index-pr-${{ github.event.pull_request.number }}
          path: |
            mcp-index-archive.tar.gz
            mcp-index-archive.tar.gz.sha256
            artifact-metadata.json
          retention-days: 7

  benchmark-smoke:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    needs: check-enabled
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip uv
          uv sync --locked --extra semantic --extra rerank
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Download latest index
        id: download_index
        run: |
          if gh release download index-latest \
              --repo ${{ github.repository }} \
              --pattern "mcp-index-archive.tar.gz" \
              --dir /tmp/mcp-index-dl 2>/dev/null; then
            mkdir -p .mcp-index
            tar -xzf /tmp/mcp-index-dl/mcp-index-archive.tar.gz -C .mcp-index/
            echo "downloaded=true" >> $GITHUB_OUTPUT
          else
            echo "No index artifact found — skipping benchmark."
            echo "downloaded=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run BM25 smoke benchmark
        if: steps.download_index.outputs.downloaded == 'true'
        run: |
          PYTHONPATH=. python scripts/run_matrix_benchmark.py \
            --bm25-only \
            --fail-below 0.55 \
            --no-native \
            --db .mcp-index/code_index.db \
            --json-out /tmp/benchmark-smoke.json \
            --md-out /tmp/benchmark-smoke.md

  cleanup-old-artifacts:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Cleanup old artifacts
        uses: actions/github-script@v9
        with:
          script: |
            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });
            
            const cutoffDate = new Date();
            cutoffDate.setDate(cutoffDate.getDate() - 30);
            
            for (const artifact of artifacts.data.artifacts) {
              if (artifact.name.startsWith('mcp-index-') && 
                  new Date(artifact.created_at) < cutoffDate) {
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: artifact.id
                });
                console.log(`Deleted old artifact: ${artifact.name}`);
              }
            }
