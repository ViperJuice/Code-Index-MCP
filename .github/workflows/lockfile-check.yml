name: lockfile-check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  alpha-dependency-sync:
    name: Alpha Gate - Dependency Sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Verify dependency lock and sync
        run: make alpha-dependency-sync
